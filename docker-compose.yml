version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: devorise-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devorise
      POSTGRES_PASSWORD: devorise123
      POSTGRES_DB: devorise
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devorise -d devorise"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
